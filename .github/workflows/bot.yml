name: Daily Auto Commit Bot

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Update log file
        run: |
          echo "Last update: $(date)" >> log.txt

      - name: Commit & Push
        run: |
          git config --global user.name "amarkumarexecutor"
          git config --global user.email "itsamansingh6205@gmail.com"
          git add .
          git commit -m "🤖 Daily auto commit" || echo "No changes"
          git push
